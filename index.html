<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K 線編輯工具</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;padding:0;background:#0b1220;color:#e5e7eb;font-family:Arial,"Microsoft JhengHei",sans-serif}body{padding:12px}h1{margin:0 0 10px;font-size:20px}.wrap{display:grid;grid-template-columns:1.3fr .9fr;gap:12px}.card{background:#111827;border:1px solid #1f2937;border-radius:12px;overflow:hidden}.card h2{margin:0;padding:10px 12px;font-size:15px;background:#0f172a;border-bottom:1px solid #1f2937}.chart-area{padding:10px;height:640px;display:flex;flex-direction:column;gap:8px}.price-box{flex:3;background:#020617;border:1px solid #1f2937;border-radius:10px;overflow:hidden}.vol-box{flex:1;background:#020617;border:1px solid #1f2937;border-radius:10px;overflow:hidden}canvas{width:100%;height:100%;display:block}.controls{padding:10px 12px;border-bottom:1px solid #1f2937;display:flex;gap:8px;flex-wrap:wrap;align-items:center}.controls button,.controls input[type=color]{border:1px solid #334155;background:#0f172a;color:#e5e7eb;border-radius:8px;padding:8px 10px;font-size:13px}.controls button{cursor:pointer}.controls button:hover{background:#162033}.controls label{display:flex;align-items:center;gap:6px;font-size:12px;color:#cbd5e1}.table-wrap{padding:10px;overflow:auto;max-height:560px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid #1f2937;padding:6px;text-align:center}th{position:sticky;top:0;background:#0f172a;z-index:1}input[type=date],input[type=number]{width:100%;background:#020617;color:#e5e7eb;border:1px solid #334155;border-radius:6px;padding:6px;font-size:13px}.small{padding:0 12px 12px;color:#94a3b8;font-size:12px;line-height:1.5}.ok{color:#86efac}.err{color:#fca5a5}@media (max-width:980px){.wrap{grid-template-columns:1fr}.chart-area{height:420px}.table-wrap{max-height:none}}
  </style>
</head>
<body>
  <h1>K 線編輯工具</h1>
  <div class="wrap">
    <div class="card">
      <h2>圖表</h2>
      <div class="controls">
        <button id="redrawBtn">更新圖表</button>
        <button id="addBtn">新增一根</button>
        <button id="delBtn">刪除最後一根</button>
        <button id="sampleBtn">還原範例</button>
        <button id="pngBtn">匯出 PNG</button>
        <label>上漲 <input type="color" id="upColor" value="#16a34a"></label>
        <label>下跌 <input type="color" id="downColor" value="#ef4444"></label>
        <label>量能 <input type="color" id="volColor" value="#60a5fa"></label>
      </div>
      <div class="chart-area">
        <div class="price-box"><canvas id="priceCanvas"></canvas></div>
        <div class="vol-box"><canvas id="volumeCanvas"></canvas></div>
      </div>
      <div class="small">
        直接在右邊表格修改日期、開高低收、成交量，再按「更新圖表」即可。日期欄位使用瀏覽器原生日期輸入元件，通常會以標準日期格式處理。[web:114][web:116]
        <div id="msg"></div>
      </div>
    </div>
    <div class="card">
      <h2>資料表</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>日期</th><th>開</th><th>高</th><th>低</th><th>收</th><th>量</th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="small">建議規則：最高要 ≥ 開盤 / 收盤，最低要 ≤ 開盤 / 收盤；若填錯，圖還是能畫，但會變得不合理。</div>
    </div>
  </div>
<script>
const sampleData=[
{time:'2026-04-01',open:100,high:110,low:95,close:105,volume:15000},
{time:'2026-04-02',open:105,high:115,low:100,close:112,volume:18000},
{time:'2026-04-03',open:112,high:118,low:108,close:110,volume:22000},
{time:'2026-04-06',open:110,high:120,low:109,close:119,volume:25000},
{time:'2026-04-07',open:119,high:123,low:115,close:121,volume:21000},
{time:'2026-04-08',open:121,high:125,low:118,close:117,volume:26000},
{time:'2026-04-09',open:117,high:119,low:112,close:113,volume:19000},
{time:'2026-04-10',open:113,high:118,low:111,close:116,volume:23000},
{time:'2026-04-13',open:116,high:122,low:114,close:121,volume:27000},
{time:'2026-04-14',open:121,high:124,low:120,close:123,volume:24000},
{time:'2026-04-15',open:123,high:127,low:122,close:126,volume:28000},
{time:'2026-04-16',open:126,high:129,low:124,close:125,volume:20000},
{time:'2026-04-17',open:125,high:128,low:123,close:127,volume:26000},
{time:'2026-04-20',open:127,high:130,low:125,close:129,volume:30000},
{time:'2026-04-21',open:129,high:133,low:128,close:132,volume:32000}
];
const tbody=document.getElementById('tbody'),msg=document.getElementById('msg');
const priceCanvas=document.getElementById('priceCanvas'),volumeCanvas=document.getElementById('volumeCanvas');
const upColor=document.getElementById('upColor'),downColor=document.getElementById('downColor'),volColor=document.getElementById('volColor');
function cloneData(){return sampleData.map(function(x){return{time:x.time,open:x.open,high:x.high,low:x.low,close:x.close,volume:x.volume};});}
function makeCell(type,value){var td=document.createElement('td');var input=document.createElement('input');input.type=type;input.value=value; if(type==='number') input.step='any'; td.appendChild(input); return td;}
function renderTable(rows){tbody.innerHTML='';rows.forEach(function(r){var tr=document.createElement('tr');tr.appendChild(makeCell('date',r.time));tr.appendChild(makeCell('number',r.open));tr.appendChild(makeCell('number',r.high));tr.appendChild(makeCell('number',r.low));tr.appendChild(makeCell('number',r.close));tr.appendChild(makeCell('number',r.volume));tbody.appendChild(tr);});}
function readTable(){return Array.from(tbody.querySelectorAll('tr')).map(function(tr){var t=tr.querySelectorAll('input');return{time:t[0].value,open:+t[1].value,high:+t[2].value,low:+t[3].value,close:+t[4].value,volume:+t[5].value};}).filter(function(r){return r.time;});}
function setMsg(text,ok){msg.className=ok?'ok':'err';msg.textContent=text;}
function resize(){priceCanvas.width=priceCanvas.parentElement.clientWidth;priceCanvas.height=priceCanvas.parentElement.clientHeight;volumeCanvas.width=volumeCanvas.parentElement.clientWidth;volumeCanvas.height=volumeCanvas.parentElement.clientHeight;draw(readTable());}
function draw(data){var pc=priceCanvas.getContext('2d'),vc=volumeCanvas.getContext('2d'),pw=priceCanvas.width,ph=priceCanvas.height,vw=volumeCanvas.width,vh=volumeCanvas.height;pc.fillStyle='#020617';pc.fillRect(0,0,pw,ph);vc.fillStyle='#020617';vc.fillRect(0,0,vw,vh);if(!data.length){setMsg('目前沒有資料列。',false);return}var min=Infinity,max=-Infinity,maxVol=0;for(var i=0;i<data.length;i++){var d=data[i];if(!Number.isFinite(d.open)||!Number.isFinite(d.high)||!Number.isFinite(d.low)||!Number.isFinite(d.close)||!Number.isFinite(d.volume)){setMsg('有空白或非數字欄位，請檢查。',false);return}min=Math.min(min,d.low);max=Math.max(max,d.high);maxVol=Math.max(maxVol,d.volume)}var padT=10,padB=18,usableH=ph-padT-padB,cw=Math.max(6,pw/(data.length*1.6)),gap=cw*0.55,total=cw+gap,startX=(pw-total*data.length)/2;function priceToY(x){return ph-padB-((x-min)/((max-min)||1))*usableH}pc.strokeStyle='#334155';pc.lineWidth=1;for(i=0;i<5;i++){var y=padT+(usableH/4)*i;pc.beginPath();pc.moveTo(0,y);pc.lineTo(pw,y);pc.stroke()}for(i=0;i<data.length;i++){d=data[i];var x=startX+i*total+cw/2,yh=priceToY(d.high),yl=priceToY(d.low),yo=priceToY(d.open),yc=priceToY(d.close),col=d.close>=d.open?upColor.value:downColor.value;pc.strokeStyle=col;pc.beginPath();pc.moveTo(x,yh);pc.lineTo(x,yl);pc.stroke();var top=Math.min(yo,yc),bottom=Math.max(yo,yc),bh=Math.max(bottom-top,2);pc.fillStyle=col;pc.fillRect(x-cw/2,top,cw,bh);var barH=(d.volume/(maxVol||1))*(vh-16);vc.fillStyle=volColor.value;vc.fillRect(startX+i*total,vh-barH-8,cw,barH);vc.fillStyle='#94a3b8';vc.font='10px Arial';vc.textAlign='center';vc.fillText((d.time||'').slice(5),startX+i*total+cw/2,vh-1)}setMsg('圖表已更新。',true)}
function addRow(){var rows=readTable(),last=rows[rows.length-1];rows.push(last?{time:last.time,open:last.open,high:last.high,low:last.low,close:last.close,volume:last.volume}:{time:'2026-04-22',open:100,high:105,low:98,close:102,volume:10000});renderTable(rows);resize();}
function delRow(){var rows=readTable();rows.pop();renderTable(rows);resize();}
function restore(){renderTable(cloneData());resize();}
function exportPNG(){var out=document.createElement('canvas');var w=priceCanvas.width,h=priceCanvas.height+volumeCanvas.height+8;out.width=w;out.height=h;var c=out.getContext('2d');c.fillStyle='#020617';c.fillRect(0,0,w,h);c.drawImage(priceCanvas,0,0);c.drawImage(volumeCanvas,0,priceCanvas.height+8);var a=document.createElement('a');a.href=out.toDataURL('image/png');a.download='kline-chart.png';a.click();}
document.getElementById('redrawBtn').addEventListener('click',function(){draw(readTable());});
document.getElementById('addBtn').addEventListener('click',addRow);
document.getElementById('delBtn').addEventListener('click',delRow);
document.getElementById('sampleBtn').addEventListener('click',restore);
document.getElementById('pngBtn').addEventListener('click',exportPNG);
upColor.addEventListener('input',function(){draw(readTable());});
downColor.addEventListener('input',function(){draw(readTable());});
volColor.addEventListener('input',function(){draw(readTable());});
window.addEventListener('resize',resize);
renderTable(cloneData());
window.addEventListener('load',resize);
</script>
</body>
</html>
